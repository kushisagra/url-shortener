# Test Configuration
# Uses H2 in-memory database instead of PostgreSQL

spring.application.name=urlshortener-test

# H2 In-Memory Database (created fresh for each test)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Settings for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Base URL for tests
app.base-url=http://localhost:8080

# JWT Settings (test secret)
app.jwt.secret=TestSecretKeyForJWTTokenSigningMustBeAtLeast256BitsLongForTesting123
app.jwt.expiration-ms=3600000

# Rate Limiting
app.rate-limit.max-requests=10
app.rate-limit.window-seconds=60

# Cache TTL
app.cache.ttl-hours=24

# Disable Redis for tests (we'll mock CacheService)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

