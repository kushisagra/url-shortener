# App
spring.application.name=urlshortener
server.port=${PORT:8080}

# PostgreSQL - Uses environment variables, falls back to localhost for development
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/urlshortener}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Base URL (used to build short links) - Set in Render environment
app.base-url=${BASE_URL:http://localhost:8080}

# Redis - Uses environment variables
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# Connection pool
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1

# Logging - reduce in production
logging.level.com.kushagra.urlshortener=${LOG_LEVEL:INFO}
logging.level.io.lettuce.core=INFO

# Cache TTL default (24 hours)
app.cache.ttl-hours=${CACHE_TTL_HOURS:24}

# JWT Security Configuration
# IMPORTANT: Set JWT_SECRET environment variable in Render!
app.jwt.secret=${JWT_SECRET:DevOnlySecretKeyThatShouldBeReplacedInProduction123456789}
# Token validity in milliseconds (24 hours = 86400000 ms)
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Rate Limiting
app.rate-limit.max-requests=${RATE_LIMIT_MAX:10}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW:60}

# ====== Swagger / OpenAPI Configuration ======
# Swagger UI path: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
# API docs path: http://localhost:8080/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
# Sort endpoints by HTTP method
springdoc.swagger-ui.operations-sorter=method
# Sort tags alphabetically
springdoc.swagger-ui.tags-sorter=alpha
# Expand operations by default
springdoc.swagger-ui.doc-expansion=list
# Show request duration
springdoc.swagger-ui.show-extensions=true
# Try it out enabled by default
springdoc.swagger-ui.try-it-out-enabled=true

